<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M256 28 L462 100 C462 100 472 280 256 484 C40 280 50 100 50 100 Z"
        fill="url(#shieldGrad)" stroke="#dc2626" stroke-width="8"/>

  <!-- Inner shield border accent -->
  <path d="M256 56 L436 118 C436 118 445 272 256 454 C67 272 76 118 76 118 Z"
        fill="none" stroke="#dc2626" stroke-width="2" opacity="0.3"/>

  <!-- Red chevron accent at top -->
  <path d="M256 70 L420 128 L256 158 L92 128 Z" fill="url(#redGrad)" opacity="0.9"/>

  <!-- Barbell icon -->
  <!-- Left outer plate -->
  <rect x="128" y="218" width="28" height="80" rx="6" fill="url(#redGrad)"/>
  <!-- Left inner plate -->
  <rect x="162" y="230" width="22" height="56" rx="4" fill="#dc2626" opacity="0.7"/>
  <!-- Bar -->
  <rect x="184" y="250" width="144" height="16" rx="3" fill="url(#barGrad)"/>
  <!-- Right inner plate -->
  <rect x="328" y="230" width="22" height="56" rx="4" fill="#dc2626" opacity="0.7"/>
  <!-- Right outer plate -->
  <rect x="356" y="218" width="28" height="80" rx="6" fill="url(#redGrad)"/>

  <!-- PB text below barbell -->
  <text x="256" y="370" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="72" letter-spacing="8"
        fill="#f4f4f5">PB</text>

  <!-- Small accent line under text -->
  <rect x="196" y="384" width="120" height="3" rx="1.5" fill="#dc2626" opacity="0.6"/>
</svg>
